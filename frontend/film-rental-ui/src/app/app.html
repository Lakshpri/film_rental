<ng-container *ngIf="isPublicRoute">
  <router-outlet></router-outlet>
</ng-container>

<div class="app-shell" *ngIf="!isPublicRoute && auth.currentMember as member">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h1>FilmRental</h1>
      <span>Admin System</span>
    </div>

    <div class="sidebar-user" [style.border-color]="member.color + '44'">
      <div class="sidebar-avatar" [style.background]="member.color + '22'" [style.border-color]="member.color + '55'">
        <span [style.color]="member.color">
          {{ member.displayName.split(' ')[0][0] }}{{ member.displayName.split(' ')[1] ? member.displayName.split(' ')[1][0] : '' }}
        </span>
      </div>
      <div>
        <div class="sidebar-user-name">{{ member.displayName.split(' ')[0] }}</div>
        <div class="sidebar-user-role" [style.color]="member.color">{{ member.module }}</div>
      </div>
    </div>

    <div class="nav-section-title">{{ member.module }}</div>
    <a
      *ngFor="let entity of member.entities"
      class="nav-item"
      [routerLink]="entity.route"
      routerLinkActive="active">
      <span style="font-size:14px">{{ entity.icon }}</span>
      {{ entity.label }}
    </a>

    <div style="flex:1"></div>

    <div class="sidebar-bottom">
      <a class="nav-item" routerLink="/module-home">
        <span style="font-size:14px">🏠</span> Module Home
      </a>
      <button class="sidebar-logout" (click)="logout()">
        <span style="font-size:14px">🚪</span> Logout
      </button>
    </div>
  </nav>

  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
